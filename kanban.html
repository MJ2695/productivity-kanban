}

body {

}

/* ── HEADER ─────────────────────────────────────────────────────────── */
.header {
  border-bottom: 1px solid var(--border);
  padding: 16px 28px;

  align-items: baseline;
  justify-content: space-between;
}
.header-left { display: flex; align-items: baseline; gap: 16px; }

  letter-spacing: -0.3px;
  color: var(--ink);
}

  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;

}
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-meta {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--ink-3);
  letter-spacing: 0.02em;
}
.header-meta span { color: var(--ink-2); }

/* ── FILTER BAR ──────────────────────────────────────────────────────── */
.filter-bar { display: flex; gap: 4px; }
.filter-btn {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--ink-3);
  cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.filter-btn:hover { background: var(--surface); color: var(--ink-2); }
.filter-btn.active { background: var(--ink); color: var(--surface); border-color: var(--ink); }

/* ── GOALS BAR ──────────────────────────────────────────────────────── */
.goals-bar {
  padding: 10px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border-2);
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.goals-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-3);

}
.goal-chip {
  display: inline-flex;

  padding: 3px 9px;

  background: var(--surface-2);
  font-size: 11px;
  color: var(--ink-2);
}

.goal-chip .goal-count { font-family: 'Geist Mono', monospace; font-size: 9px; color: var(--ink-3); }

.board {

.col-header.done    .col-name { color: var(--col-done); }
.col-count {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;

.col-body { display: flex; flex-direction: column; gap: 8px; padding-top: 10px; max-height: 480px; overflow-y: auto; }
.col-empty {

  font-family: 'Libre Baskerville', serif;
}

/* ── TASK CARD ──────────────────────────────────────────────────────── */
.card {

}

.gantt-day-cell.today-col { color: var(--ink); font-weight: 500; background: rgba(185,28,28,0.04); }
.gantt-day-cell.weekend { background: var(--surface-2); }
.gantt-day-bg { display: flex; height: 100%; position: absolute; top: 0; left: 0; right: 0; }
.gantt-day-bg-cell { flex: 1; border-right: 0.5px solid var(--border-2); min-width: 32px; }
.gantt-day-bg-cell:last-child { border-right: none; }
.gantt-day-bg-cell.today-col { background: rgba(185,28,28,0.04); }
.gantt-day-bg-cell.weekend { background: var(--surface-2); }
.gantt-bar-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; padding: 6px 0; }
.gantt-bar {
  position: absolute; height: 18px; border-radius: 3px;
  display: flex; align-items: center; padding: 0 6px;
  font-family: 'Geist Mono', monospace; font-size: 9px; font-weight: 500;
  white-space: nowrap; overflow: hidden; color: white; min-width: 4px;
}
.gantt-bar.done-bar { opacity: 0.45; }
.gantt-today-line { position: absolute; width: 1.5px; top: 0; bottom: 0; background: rgba(185,28,28,0.6); z-index: 5; pointer-events: none; }
.gantt-dot { position: absolute; width: 10px; height: 10px; border-radius: 50%; top: 50%; transform: translateY(-50%); z-index: 4; border: 1.5px solid white; }

/* ── TODO LIST ───────────────────────────────────────────────────────── */
.todo-section { padding: 0 28px 32px; }
.todo-header { display: flex; align-items: baseline; gap: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.todo-empty { font-family: 'Libre Baskerville', serif; font-style: italic; font-size: 12px; color: var(--ink-3); padding: 12px 0; }
.todo-list { display: flex; flex-direction: column; gap: 1px; }
.todo-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: background 0.1s; }
.todo-item:hover { background: var(--surface-2); }
.todo-item.checked { opacity: 0.45; }
.todo-checkbox { width: 15px; height: 15px; border: 1.5px solid var(--border); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.1s, border-color 0.1s; }
.todo-item.checked .todo-checkbox { background: var(--ink-3); border-color: var(--ink-3); }
.todo-check-icon { display: none; color: white; font-size: 9px; line-height: 1; }
.todo-item.checked .todo-check-icon { display: block; }
.todo-title { font-size: 13px; color: var(--ink); flex: 1; }
.todo-item.checked .todo-title { text-decoration: line-through; color: var(--ink-3); }
.todo-meta { display: flex; align-items: center; gap: 6px; }

/* ── FOOTER ─────────────────────────────────────────────────────────── */
.footer {
  padding: 14px 28px; border-top: 1px solid var(--border-2);
  background: var(--surface); display: flex; align-items: center;
  justify-content: space-between; font-family: 'Geist Mono', monospace;
  font-size: 10px; color: var(--ink-3);
}
.footer-note { font-style: italic; font-family: 'Libre Baskerville', serif; font-size: 11px; }

@media (max-width: 1200px) { .board { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 900px) { .board { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 540px) {
  .board { grid-template-columns: 1fr; padding: 12px; }
  .header, .goals-bar, .footer { padding-left: 12px; padding-right: 12px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-title">Tasks</div>
    <div class="header-sub">Personal Agent · Kanban</div>
  </div>
  <div class="header-right">
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">Both</button>
      <button class="filter-btn" data-filter="work">Work</button>
      <button class="filter-btn" data-filter="personal">Personal</button>
    </div>
    <div class="header-meta" id="header-meta">—</div>
  </div>
</div>

<!-- GOALS BAR -->
<div class="goals-bar" id="goals-bar">
  <span class="goals-label">Goals</span>
</div>

<!-- BOARD -->
<div class="board">
  <div class="col" id="col-inbox">
    <div class="col-header inbox">
      <span class="col-name">Inbox</span>
      <span class="col-count" id="count-inbox">0</span>
    </div>
    <div class="col-body" id="body-inbox"></div>
  </div>
  <div class="col" id="col-active">
    <div class="col-header active">
      <span class="col-name">Active</span>
      <span class="col-count" id="count-active">0</span>
    </div>
    <div class="col-body" id="body-active"></div>
  </div>
  <div class="col" id="col-snoozed">
    <div class="col-header snoozed">
      <span class="col-name">Snoozed</span>
      <span class="col-count" id="count-snoozed">0</span>
    </div>
    <div class="col-body" id="body-snoozed"></div>
  </div>
  <div class="col" id="col-todo">
    <div class="col-header todo">
      <span class="col-name">To-do</span>
      <span class="col-count" id="count-todo">0</span>
    </div>
    <div class="col-body" id="body-todo"></div>
  </div>
  <div class="col" id="col-done">
    <div class="col-header done">
      <span class="col-name">Done</span>
      <span class="col-count" id="count-done">0</span>
    </div>
    <div class="col-body" id="body-done"></div>
  </div>
</div>

<!-- GANTT -->
<div class="gantt-section">
  <div class="gantt-header">
    <div class="gantt-title">Timeline</div>
    <div class="gantt-sub" id="gantt-sub">tasks with deadlines · 28-day window</div>
  </div>
  <div id="gantt-container"></div>
</div>

<!-- FOOTER -->
<div class="footer">
  <span class="footer-note">Read-only · all changes through Cowork chat</span>
  <span id="footer-ts">—</span>
</div>

<script>
// ── HELPERS ──────────────────────────────────────────────────────────────────

const CAT_LABELS = {
  work:     "Work",
  health:   "Health",
  learning: "Learning",
  personal: "Personal",
  finance:  "Finance",
  academic: "Academic",
  hobby:    "Hobby"
};

const CAT_COLORS = {
  work:     "#0D5C63",
  health:   "#1A5C35",
  learning: "#4C1D95",
  personal: "#92400E",
  finance:  "#7F1D1D",
  academic: "#1E3A5F",
  hobby:    "#065F46"
};

function fmtDuration(mins) {
  if (!mins) return '';
  if (mins < 90) return `~${mins}m`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m > 0 ? `~${h}h ${m}m` : `~${h}h`;
}

function fmtDate(iso) {
  if (!iso) return null;
  const d = new Date(iso + (iso.length === 10 ? 'T12:00:00' : ''));
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function daysUntil(iso) {
  if (!iso) return null;
  const d = new Date(iso + 'T23:59:59');
  return Math.ceil((d - new Date()) / 86400000);
}

function isUrgent(task) {
  if (!task.deadline?.date) return false;
  const days = daysUntil(task.deadline.date);
  return days !== null && days <= 2 && task.status !== 'done';
}

function quadrantClass(q) {
  return q ? q.toLowerCase() : 'q2';
}

// ── GOAL CHIPS ────────────────────────────────────────────────────────────────

function renderGoals() {
  const bar = document.getElementById('goals-bar');
  if (!GOALS.length) { bar.style.display = 'none'; return; }

  const activeTasks = TASKS.filter(t => t.status !== 'done');

  GOALS.filter(g => g.status === 'active').forEach(g => {
    const linked = activeTasks.filter(t => t.goal_id === g.id).length;
    const chip = document.createElement('div');
    chip.className = 'goal-chip';
    chip.innerHTML = `
      <div class="goal-dot"></div>
      ${g.title}
      ${linked > 0 ? `<span class="goal-count">${linked}</span>` : ''}
    `;
    bar.appendChild(chip);
  });
}

// ── CARD BUILDER ─────────────────────────────────────────────────────────────

function buildCard(task) {
  const card = document.createElement('div');
  card.className = 'card' +
    (task.status === 'done' ? ' done' : '') +
    (isUrgent(task) ? ' urgent' : '');

  const quad = task.priority?.quadrant || 'Q2';
  const urgent = isUrgent(task);

  // Milestone progress bar
  let milestoneHtml = '';
  if (task.milestones?.length) {
    const steps = task.milestones.map(m => {
      const cls = m.status === 'done' ? 'ms-done' : m.status === 'active' ? 'ms-active' : 'ms-inbox';
      return `<div class="milestone-step ${cls}"></div>`;
    }).join('');
    const done = task.milestones.filter(m => m.status === 'done').length;
    const currentMs = task.milestones.find(m => m.status !== 'done');
    const currentMsHtml = currentMs
      ? `<div class="milestone-current"><span class="milestone-current-label">Next</span>${currentMs.title}</div>`
      : '';
    milestoneHtml = `
      <div class="milestone-track">
        <div class="milestone-label">${done}/${task.milestones.length} milestones</div>
        <div class="milestone-steps">${steps}</div>
        ${currentMsHtml}
      </div>
    `;
  }

  // Done badge
  let doneBadgeHtml = '';
  if (task.status === 'done' && task.done_at) {
    doneBadgeHtml = `
      <div class="done-badge">
        <span class="done-check">✓</span>
        ${fmtDate(task.done_at)}
        ${task.actual_duration ? ` · ${task.actual_duration}m actual` : ''}
      </div>
    `;
  }

  // Snooze warning
  const snoozeHtml = task.snooze_count >= 3
    ? `<span class="badge snooze-warn">⏸ snoozed ${task.snooze_count}×</span>`
    : '';

  // Deadline meta
  let deadlineMeta = '';
  if (task.deadline?.date && task.status !== 'done') {
    const dateStr = fmtDate(task.deadline.date);
    const hardMark = task.deadline.type === 'hard' ? ' ·h' : '';
    if (urgent) {
      deadlineMeta = `<span class="meta-urgent">⚑ due ${dateStr}${hardMark}</span>`;
    } else {
      deadlineMeta = `<span>due ${dateStr}${hardMark}</span>`;
    }
  }

  // Start date meta
  const todayIso = new Date().toISOString().slice(0, 10);
  let startMeta = '';
  if (task.start_date && task.status !== 'done') {
    const startStr = fmtDate(task.start_date);
    const isToday  = task.start_date === todayIso;
    const isPast   = task.start_date < todayIso;
    if (isToday) {
      startMeta = `<span style="color:var(--q2);font-weight:500">▶ today</span>`;
    } else if (isPast && task.status === 'inbox') {
      startMeta = `<span style="color:#B91C1C;font-weight:500">▶ overdue start ${startStr}</span>`;
    } else {
      startMeta = `<span>▶ ${startStr}</span>`;
    }
  }

  const durationMeta = task.duration_estimate
    ? `<span>${fmtDuration(task.duration_estimate)}</span>`
    : '';

  const goalMeta = task.goal_title && task.status !== 'done'
    ? `<span class="badge goal-link">↗ ${task.goal_title}</span>`
    : '';

  card.innerHTML = `
    <div class="card-title">${task.title}</div>
    <div class="card-badges">
      <span class="badge cat-${task.category}">${CAT_LABELS[task.category] || task.category}</span>
      <span class="badge ${quadrantClass(quad)}">${quad}</span>
      ${snoozeHtml}
      ${goalMeta}
    </div>
    ${milestoneHtml}
    <div class="card-meta">
      ${startMeta}
      ${deadlineMeta}
      ${durationMeta}
    </div>
    ${doneBadgeHtml}
  `;

  return card;
}

// ── SORT ─────────────────────────────────────────────────────────────────────

function sortTasks(tasks) {
  return [...tasks].sort((a, b) => {
    // Primary: start_date ascending (nulls last)
    if (a.start_date && b.start_date)
      return new Date(a.start_date) - new Date(b.start_date);
    if (a.start_date) return -1;
    if (b.start_date) return 1;
    // Secondary: deadline ascending
    if (a.deadline?.date && b.deadline?.date)
      return new Date(a.deadline.date) - new Date(b.deadline.date);
    if (a.deadline?.date) return -1;
    if (b.deadline?.date) return 1;
    return new Date(b.created_at) - new Date(a.created_at);
  });
}

// ── FILTER ───────────────────────────────────────────────────────────────────

const WORK_CATS     = new Set(['work']);
const PERSONAL_CATS = new Set(['personal', 'health', 'finance', 'learning', 'academic', 'hobby']);

let activeFilter = 'all';

function filterTasks(tasks) {
  if (activeFilter === 'work')     return tasks.filter(t => WORK_CATS.has(t.category));
  if (activeFilter === 'personal') return tasks.filter(t => PERSONAL_CATS.has(t.category));
  return tasks;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
    renderTodo();
  });
});

// ── RENDER ───────────────────────────────────────────────────────────────────

function render() {
  const columns = {
    inbox:   filterTasks(TASKS.filter(t => t.status === 'inbox')),
    active:  filterTasks(TASKS.filter(t => t.status === 'active')),
    snoozed: filterTasks(TASKS.filter(t => t.status === 'snoozed')),
    done:    filterTasks(TASKS.filter(t => t.status === 'done'))
      .sort((a, b) => new Date(b.done_at || 0) - new Date(a.done_at || 0))
      .slice(0, 10)
  };

  ['inbox', 'active', 'snoozed'].forEach(col => {
    const sorted = sortTasks(columns[col]);
    const body = document.getElementById(`body-${col}`);
    const count = document.getElementById(`count-${col}`);
    count.textContent = sorted.length;
    body.innerHTML = '';
    if (!sorted.length) {
      body.innerHTML = `<div class="col-empty">—</div>`;
    } else {
      sorted.forEach(t => body.appendChild(buildCard(t)));
    }
  });

  const doneBody = document.getElementById('body-done');
  const doneCount = document.getElementById('count-done');
  doneCount.textContent = columns.done.length;
  doneBody.innerHTML = '';
  if (!columns.done.length) {
    doneBody.innerHTML = `<div class="col-empty">—</div>`;
  } else {
    columns.done.forEach(t => doneBody.appendChild(buildCard(t)));
  }

  const visibleTasks = filterTasks(TASKS);
  const open = visibleTasks.filter(t => t.status !== 'done').length;
  const urgent = visibleTasks.filter(t => isUrgent(t)).length;
  document.getElementById('header-meta').innerHTML =
    `<span>${open} open</span>` +
    (urgent > 0 ? ` · <span style="color:#B91C1C;font-weight:500">${urgent} urgent</span>` : '');

  try {
    const d = new Date(GENERATED_AT);
    document.getElementById('footer-ts').textContent =
      'Updated ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
      ' at ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  } catch {}
}

// ── GANTT ─────────────────────────────────────────────────────────────────────

function renderGantt() {
  const container = document.getElementById('gantt-container');
  const today = new Date(); today.setHours(0,0,0,0);

  const DAYS_BEFORE = 1;
  const DAYS_AFTER  = 28;
  const TOTAL_DAYS  = DAYS_BEFORE + DAYS_AFTER;
  const windowStart = new Date(today); windowStart.setDate(today.getDate() - DAYS_BEFORE);
  const windowEnd   = new Date(today); windowEnd.setDate(today.getDate() + DAYS_AFTER);

  const days = [];
  for (let i = 0; i < TOTAL_DAYS; i++) {
    const d = new Date(windowStart);
    d.setDate(windowStart.getDate() + i);
    const isToday = d.toDateString() === today.toDateString();
    const isWeekend = d.getDay() === 0 || d.getDay() === 6;
    days.push({ date: d, isToday, isWeekend, index: i });
  }

  const tasksWithDeadline = TASKS
    .filter(t => t.deadline?.date && t.status !== 'deleted' && t.status !== 'done')
    .map(t => {
      const dl    = new Date(t.deadline.date + 'T23:59:59');
      const start = new Date((t.start_date || t.created_at.slice(0,10)) + 'T00:00:00');
      start.setHours(0,0,0,0);
      const clampedStart = start < windowStart ? windowStart : start;
      const clampedEnd   = dl   > windowEnd   ? windowEnd   : dl;
      const startIdx = Math.round((clampedStart - windowStart) / 86400000);
      const endIdx   = Math.round((clampedEnd   - windowStart) / 86400000);
      const dlIdx    = Math.round((dl - windowStart) / 86400000);
      return { task: t, dl, start, clampedStart, clampedEnd, startIdx, endIdx, dlIdx };
    })
    .filter(r => r.dl >= windowStart)
    .sort((a, b) => a.start - b.start || a.dl - b.dl);

  if (!tasksWithDeadline.length) {
    container.innerHTML = '<div class="gantt-empty">No tasks with deadlines to show.</div>';
    return;
  }

  const CAT_FILL = {
    work:     '#0D5C63', health:   '#1A5C35',
    learning: '#4C1D95', personal: '#92400E', finance: '#7F1D1D',
    academic: '#1E3A5F', hobby: '#065F46'
  };

  const gtc = `200px repeat(${TOTAL_DAYS}, 1fr)`;

  const headerCells = days.map(d => {
    const cls = ['gantt-day-cell', d.isToday ? 'today-col' : '', d.isWeekend ? 'weekend' : ''].join(' ').trim();
    const label = d.isToday ? 'Today'
      : d.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const showLabel = d.isToday || d.index % 4 === 0;
    return `<div class="${cls}">${showLabel ? label : ''}</div>`;
  }).join('');

  const rowsHtml = tasksWithDeadline.map(({ task, dl, start, startIdx, endIdx, dlIdx }) => {
    const fill = CAT_FILL[task.category] || '#6B7280';
    const isDone = task.status === 'done';
    const isUrgentTask = isUrgent(task);

    const barLeft  = Math.max(0, startIdx);
    const barRight = Math.min(TOTAL_DAYS - 1, dlIdx);
    const barWidth = Math.max(1, barRight - barLeft + 1);
    const dotIdx   = Math.min(TOTAL_DAYS - 1, Math.max(0, dlIdx));
    const todayIdx = DAYS_BEFORE;

    const bgCells = days.map(d => {
      const cls = ['gantt-day-bg-cell', d.isToday ? 'today-col' : '', d.isWeekend ? 'weekend' : ''].join(' ').trim();
      return `<div class="${cls}"></div>`;
    }).join('');

    const leftPct  = (barLeft  / TOTAL_DAYS) * 100;
    const widthPct = (barWidth / TOTAL_DAYS) * 100;
    const dotPct   = ((dotIdx + 0.5) / TOTAL_DAYS) * 100;
    const todayPct = ((todayIdx + 0.5) / TOTAL_DAYS) * 100;

    const urgentStyle = isUrgentTask ? 'border: 1.5px solid #B91C1C;' : '';
    const label = task.title.length > 22 ? task.title.slice(0, 21) + '…' : task.title;

    // Milestone sub-rows — positioned against FULL task timeline, not clamped bar
    let msRowsHtml = '';
    if (task.milestones?.length) {
      const totalMs = task.milestones.length;
      const fullSpanDays = Math.max(1, Math.round((dl - start) / 86400000));
      const fullStartRelDay = Math.round((start - windowStart) / 86400000);

      task.milestones.forEach((ms, i) => {
        const isMsDone  = ms.status === 'done';
        const isCurrent = !isMsDone && task.milestones.slice(0, i).every(m => m.status === 'done');
        const msColor      = isMsDone ? '#16A34A' : isCurrent ? '#3B82F6' : '#9CA3AF';
        const msTitleClass = isMsDone ? 'gantt-ms-label-title ms-done-text' : 'gantt-ms-label-title';

        const msFullStartDay = fullStartRelDay + Math.round((i / totalMs) * fullSpanDays);
        const msFullEndDay   = fullStartRelDay + Math.round(((i + 1) / totalMs) * fullSpanDays);

        // Clamp to visible window
        let msCStart = Math.max(0, msFullStartDay);
        let msCEnd   = Math.min(TOTAL_DAYS, msFullEndDay);
        if (msCEnd <= 0) {
          if (isMsDone) {
            // Tiny past indicator for done milestones
            msCStart = 0; msCEnd = 1;
          } else if (isCurrent) {
            // Current milestone fell entirely before window — show from window start to today
            msCStart = 0; msCEnd = DAYS_BEFORE + 1;
          } else {
            return;
          }
        }
        // Always extend current milestone at least to today
        if (isCurrent) msCEnd = Math.max(msCEnd, DAYS_BEFORE + 1);
        const msWidth = Math.max(msCStart < TOTAL_DAYS ? 1 : 0, msCEnd - msCStart);
        if (msWidth === 0) return;

        const msLeftPct  = (msCStart / TOTAL_DAYS) * 100;
        const msWidthPct = (msWidth  / TOTAL_DAYS) * 100;

        const msBgCells = days.map(d => {
          const cls = ['gantt-day-bg-cell', d.isToday ? 'today-col' : '', d.isWeekend ? 'weekend' : ''].join(' ').trim();
          return `<div class="${cls}"></div>`;
        }).join('');
        msRowsHtml += `
          <div class="gantt-row milestone-row" style="grid-template-columns:${gtc};">
            <div class="gantt-ms-label-col">
              <div class="${msTitleClass}" title="${ms.title}">
                ${isMsDone ? '✓' : isCurrent ? '▶' : '○'} ${ms.title}
              </div>
            </div>
            <div class="gantt-timeline-col" style="grid-column:2/${TOTAL_DAYS+2};position:relative;min-height:24px;">
              <div class="gantt-day-bg" style="position:absolute;top:0;bottom:0;left:0;right:0;display:flex;">${msBgCells}</div>
              <div class="gantt-today-line" style="left:${todayPct}%;"></div>
              <div class="gantt-bar-container">
                <div class="gantt-bar ms-bar" style="left:${msLeftPct}%;width:${msWidthPct}%;background:${msColor};">&nbsp;</div>
              </div>
            </div>
          </div>`;
      });
    }

    return `
      <div class="gantt-row" style="grid-template-columns:${gtc};">
        <div class="gantt-label-col">
          <div class="gantt-label-title" title="${task.title}">${task.title}</div>
          <div class="gantt-label-meta">
            <span style="color:${fill}">${CAT_LABELS[task.category] || task.category}</span>
            ${task.priority?.quadrant ? ` · ${task.priority.quadrant}` : ''}
            ${isDone ? ' · done' : ''}
            ${task.deadline?.type === 'hard' ? ' · hard' : ''}
          </div>
        </div>
        <div class="gantt-timeline-col" style="grid-column:2 / ${TOTAL_DAYS + 2}; position:relative; min-height:36px;">
          <div class="gantt-day-bg" style="position:absolute;top:0;bottom:0;left:0;right:0;display:flex;">
            ${bgCells}
          </div>
          <div class="gantt-today-line" style="left:${todayPct}%;"></div>
          <div class="gantt-bar-container">
            <div class="gantt-bar ${isDone ? 'done-bar' : ''}"
              style="left:${leftPct}%;width:${widthPct}%;background:${fill};${urgentStyle}">
              ${widthPct > 8 ? label : ''}
            </div>
            <div class="gantt-dot"
              style="left:calc(${dotPct}% - 5px);background:${isUrgentTask ? '#B91C1C' : fill};">
            </div>
          </div>
        </div>
      </div>
      ${msRowsHtml}`;
  }).join('');

  container.innerHTML = `
    <div class="gantt-wrap">
      <div class="gantt-row header-row" style="grid-template-columns:${gtc};">
        <div class="gantt-label-col" style="font-family:'Geist Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);">Task</div>
        <div style="grid-column:2/${TOTAL_DAYS+2};display:flex;">${headerCells}</div>
      </div>
      ${rowsHtml}
    </div>`;

  document.getElementById('gantt-sub').textContent =
    `${tasksWithDeadline.length} task${tasksWithDeadline.length !== 1 ? 's' : ''} with deadlines · ${DAYS_AFTER}-day window · dots mark due date`;
}

// ── TODO LIST ─────────────────────────────────────────────────────────────────

function renderTodo() {
  const body = document.getElementById('body-todo');
  const count = document.getElementById('count-todo');
  const noDeadline = filterTasks(
    TASKS.filter(t => !t.deadline?.date && t.status !== 'done' && t.status !== 'deleted')
  );
  const sorted = sortTasks(noDeadline);
  count.textContent = sorted.length;
  body.innerHTML = '';
  if (!sorted.length) {
    body.innerHTML = '<div class="col-empty">—</div>';
    return;
  }
  sorted.forEach(t => body.appendChild(buildCard(t)));
}

renderGoals();
render();
renderGantt();
renderTodo();
</script>
</body>
